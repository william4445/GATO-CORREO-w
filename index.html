<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Jhanely Solecito Lindo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; }
        
        /* Contenedores */
        .video-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0; visibility: hidden; transition: opacity 1.5s ease; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .contenido-interactivo { position: absolute; z-index: 5; text-align: center; width: 90%; }
        
        /* Asegurar visibilidad */
        .foto { max-width: 240px; opacity: 0; transition: opacity 1s; display: none; }
        .foto.visible { opacity: 1; display: inline-block; }
        
        .btn-empezar { z-index: 10; padding: 16px 40px; font-size: 1.2rem; color: #fff; background: transparent; border: 2px solid #fff; cursor: pointer; }
        .video-visible { opacity: 1 !important; visibility: visible !important; }
    </style>
</head>
<body>

    <button class="btn-empezar" id="btnEmpezar">Empezar</button>

    <div class="contenido-interactivo">
        <img src="assets/ro1.png" alt="Rosa" class="rosa-central" id="rosaCentral">
        <h1 class="texto-carta" id="textoMensaje"></h1>
        <div class="galeria-fotos">
            <img src="assets/tu.png" alt="Tú" class="foto" id="fotoTu">
            <img src="assets/yo.png" alt="Yo" class="foto" id="fotoYo">
        </div>
    </div>

    <div class="video-container" id="videoContainer">
        <video id="miVideo" playsinline muted loop>
            <source src="assets/M1.mp4" type="video/mp4">
        </video>
    </div>

    <audio id="miCancion" loop>
        <source src="assets/amor.mp3" type="audio/mpeg">
    </audio>

    <script>
        const btnEmpezar = document.getElementById('btnEmpezar');
        const miCancion = document.getElementById('miCancion');
        const miVideo = document.getElementById('miVideo');
        const videoContainer = document.getElementById('videoContainer');

        btnEmpezar.addEventListener('click', async () => {
            // 1. Intentar reproducir audio y video
            try {
                await miCancion.play();
                miVideo.play();
                videoContainer.classList.add('video-visible');
                btnEmpezar.style.display = 'none';
                
                // Iniciar lógica de mensajes aquí
                console.log("Iniciando secuencia...");
            } catch (err) {
                alert("Por favor, haz clic en la pantalla para activar el sonido.");
                console.error("Error de reproducción:", err);
            }
        });
    </script>
</body>
</html>
